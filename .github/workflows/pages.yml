name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Build Rust API docs
        run: cargo doc --workspace --no-deps

      - name: Assemble Pages site
        run: python scripts/build_pages.py --out-dir _site --candidate-sha "${{ github.sha }}"

      - name: Verify built candidate identity
        run: |
          python scripts/verify_pages_deployment.py \
            --site-file _site/source-version.json \
            --expected-sha "${{ github.sha }}" \
            --out artifacts/pages/build-verification.json

      - name: Upload Pages build verification
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pages-build-verification
          path: artifacts/pages/build-verification.json
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Verify deployed candidate SHA
        id: verify
        continue-on-error: true
        run: |
          python scripts/verify_pages_deployment.py \
            --url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/source-version.json" \
            --expected-sha "${{ github.sha }}" \
            --out artifacts/pages/deployment-verification.json

      - name: Upload Pages deployment verification
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pages-deployment-verification
          path: artifacts/pages/deployment-verification.json
          if-no-files-found: error

      - name: Enforce deployment and exact SHA
        if: always()
        shell: bash
        run: |
          test "${{ steps.deployment.outcome }}" = "success"
          test "${{ steps.verify.outcome }}" = "success"
