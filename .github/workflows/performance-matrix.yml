name: Performance Matrix

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 2"

env:
  CARGO_TERM_COLOR: always

jobs:
  perf-run:
    name: Perf Run (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            host_manifest: fixtures/performance/hosts/github-windows-latest.json
          - name: ubuntu
            os: ubuntu-latest
            host_manifest: fixtures/performance/hosts/github-ubuntu-latest.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run host-aware performance report
        shell: pwsh
        run: ./scripts/run-performance-report.ps1 -Suite full_stack -HostManifestPath ${{ matrix.host_manifest }}

      - name: Upload performance run bundle
        uses: actions/upload-artifact@v4
        with:
          name: performance-run-${{ matrix.name }}
          path: |
            artifacts/performance/runs
            artifacts/performance/latest.json
            artifacts/performance/latest.md
          if-no-files-found: error

  summarize:
    name: Matrix Summary
    runs-on: ubuntu-latest
    needs:
      - perf-run

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Download run artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: performance-run-*
          merge-multiple: true
          path: artifacts/performance

      - name: Build matrix report
        shell: pwsh
        run: |
          $bundles = Get-ChildItem -Path artifacts/performance -Recurse -Filter bundle.json | Select-Object -ExpandProperty FullName
          if (-not $bundles) {
            throw "No run bundles were downloaded for matrix summarization."
          }
          $arguments = @(
            "run", "-p", "aether_api", "--example", "performance_matrix_report", "--release", "--",
            "--output-json", "artifacts/performance/matrix/latest.json",
            "--output-report", "artifacts/performance/matrix/latest.md"
          ) + $bundles
          & cargo @arguments

      - name: Upload matrix summary
        uses: actions/upload-artifact@v4
        with:
          name: performance-matrix-summary
          path: artifacts/performance/matrix
          if-no-files-found: error

      - name: Publish workflow summary
        shell: pwsh
        run: |
          if (Test-Path artifacts/performance/matrix/latest.md) {
            Get-Content artifacts/performance/matrix/latest.md | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }
