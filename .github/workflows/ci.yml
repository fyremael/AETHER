name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  hardening-promotion-state:
    name: Hardening promotion state
    runs-on: ubuntu-latest
    outputs:
      admin_blocking: ${{ steps.state.outputs.admin_blocking }}
      operator_blocking: ${{ steps.state.outputs.operator_blocking }}
      user_blocking: ${{ steps.state.outputs.user_blocking }}
      exec_blocking: ${{ steps.state.outputs.exec_blocking }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read hardening promotion state
        id: state
        run: |
          python scripts/hardening_promotion.py ci-outputs \
            --config .github/hardening-promotion-state.json \
            --github-output "$GITHUB_OUTPUT"

  rust:
    name: Rust (${{ matrix.os }}, ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        toolchain:
          - "1.78.0"
          - stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          rustup toolchain install ${{ matrix.toolchain }} --profile minimal --component rustfmt --component clippy
          rustup default ${{ matrix.toolchain }}

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  go-shell:
    name: Go shell
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go/go.sum

      - name: Run Go tests
        working-directory: go
        run: go test ./...

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run Python SDK tests
        run: python -m unittest discover python/tests -v

  pilot-launch-gate:
    name: Pilot launch gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Seed CI host baselines
        shell: pwsh
        run: |
          ./scripts/run-performance-baseline.ps1 -Suite core_kernel -HostManifestPath fixtures/performance/hosts/github-windows-latest.json -OutputPath artifacts/performance/baselines/core_kernel/github-windows-latest.json
          ./scripts/run-performance-baseline.ps1 -Suite service_in_process -HostManifestPath fixtures/performance/hosts/github-windows-latest.json -OutputPath artifacts/performance/baselines/service_in_process/github-windows-latest.json

      - name: Run pilot launch validation
        shell: pwsh
        run: ./scripts/run-pilot-launch-validation.ps1 -HostManifestPath fixtures/performance/hosts/github-windows-latest.json

      - name: Upload pilot gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pilot-launch-gate-artifacts
          path: |
            artifacts/pilot/reports
            artifacts/performance
            artifacts/pilot/launch
          if-no-files-found: warn

  pilot-package:
    name: Pilot package
    runs-on: windows-latest
    needs:
      - hardening-promotion-state
      - rust
      - go-shell
      - python-sdk
      - pilot-launch-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go/go.sum

      - name: Build packaged pilot bundle
        shell: pwsh
        run: ./scripts/build-pilot-package.ps1

      - name: Upload pilot package artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-pilot-service-windows-x86_64
          path: |
            artifacts/pilot/packages/aether-pilot-service-windows-x86_64
            artifacts/pilot/packages/aether-pilot-service-windows-x86_64.zip
          if-no-files-found: error

  hardening-admin:
    name: Hardening admin (blocking)
    if: needs.hardening-promotion-state.outputs.admin_blocking == 'true'
    runs-on: windows-latest
    needs:
      - hardening-promotion-state

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go/go.sum

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run blocking admin hardening pack
        shell: pwsh
        run: ./scripts/run-hardening-sweep.ps1 -Packs admin

  hardening-operator:
    name: Hardening operator (blocking)
    if: needs.hardening-promotion-state.outputs.operator_blocking == 'true'
    runs-on: windows-latest
    needs:
      - hardening-promotion-state

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go/go.sum

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run blocking operator hardening pack
        shell: pwsh
        run: ./scripts/run-hardening-sweep.ps1 -Packs operator

  hardening-user:
    name: Hardening user (blocking)
    if: needs.hardening-promotion-state.outputs.user_blocking == 'true'
    runs-on: ubuntu-latest
    needs:
      - hardening-promotion-state

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go/go.sum

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run blocking user hardening pack
        shell: pwsh
        run: ./scripts/run-hardening-sweep.ps1 -Packs user

  hardening-exec:
    name: Hardening exec (blocking)
    if: needs.hardening-promotion-state.outputs.exec_blocking == 'true'
    runs-on: ubuntu-latest
    needs:
      - hardening-promotion-state

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go/go.sum

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run blocking exec hardening pack
        shell: pwsh
        run: ./scripts/run-hardening-sweep.ps1 -Packs exec
