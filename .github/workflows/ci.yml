name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }}, ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        toolchain:
          - "1.78.0"
          - stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          rustup toolchain install ${{ matrix.toolchain }} --profile minimal --component rustfmt --component clippy
          rustup default ${{ matrix.toolchain }}

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  go-shell:
    name: Go shell
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Run Go tests
        working-directory: go
        run: go test ./...

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run Python SDK tests
        run: python -m unittest discover python/tests -v

  pilot-launch-gate:
    name: Pilot launch gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run pilot launch validation
        shell: pwsh
        run: ./scripts/run-pilot-launch-validation.ps1

      - name: Upload pilot gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pilot-launch-gate-artifacts
          path: |
            artifacts/pilot/reports
            artifacts/performance
            artifacts/pilot/launch
          if-no-files-found: warn

  pilot-package:
    name: Pilot package
    runs-on: windows-latest
    needs:
      - rust
      - go-shell
      - python-sdk
      - pilot-launch-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build packaged pilot bundle
        shell: pwsh
        run: ./scripts/build-pilot-package.ps1

      - name: Upload pilot package artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-pilot-service-windows-x86_64
          path: |
            artifacts/pilot/packages/aether-pilot-service-windows-x86_64
            artifacts/pilot/packages/aether-pilot-service-windows-x86_64.zip
          if-no-files-found: error
