name: Reusable Exact Candidate Evidence

on:
  workflow_call:
    inputs:
      candidate_sha:
        description: Full candidate commit SHA
        required: true
        type: string
      candidate_ref:
        description: Exact candidate ref or tag
        required: true
        type: string
      qualification_subject_artifact:
        description: Immutable artifact containing the tested canonical package and candidate-bound subjects
        required: true
        type: string

permissions:
  actions: read
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  exact-candidate-evidence:
    name: Exact candidate evidence
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout exact candidate detached
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache-dependency-path: go/go.sum

      - name: Install Rust toolchain and quality components
        shell: pwsh
        run: |
          rustup toolchain install 1.86.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.86.0

      - name: Install pinned release evidence dependencies
        shell: pwsh
        run: python -m pip install --disable-pip-version-check -r requirements-release.txt

      - name: Verify immutable candidate identity
        id: candidate
        shell: pwsh
        run: |
          $head = (git rev-parse HEAD).Trim()
          $tree = (git rev-parse "HEAD^{tree}").Trim()
          $dirty = git status --porcelain --untracked-files=all
          if ($head -ne "${{ inputs.candidate_sha }}") { throw "HEAD $head does not match candidate" }
          if ($dirty) { throw "candidate checkout is dirty" }
          "tree_sha=$tree" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Capture exact gate outcomes
        shell: pwsh
        env:
          AETHER_WORKFLOW_FILE: .github/workflows/reusable-exact-candidate-evidence.yml
          AETHER_JOB_ID: exact-candidate-evidence
          AETHER_ARTIFACT_NAME: aether-release-evidence-${{ inputs.candidate_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          CARGO_BUILD_JOBS: "1"
        run: |
          python scripts/release_evidence.py capture `
            --official `
            --enforce `
            --ref "${{ inputs.candidate_ref }}" `
            --run-id "${{ github.run_id }}" `
            --attempt "${{ github.run_attempt }}" `
            --runner Windows `
            --host github-windows-latest `
            --output-dir artifacts/release/exact-candidate

      - name: Download tested canonical package and qualification subjects
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ inputs.qualification_subject_artifact }}
          path: artifacts/release/qualification

      - name: Resolve immutable qualification inputs
        id: qualification
        shell: pwsh
        run: |
          $root = "artifacts/release/qualification"
          $inputs = Get-Content "$root/qualification-inputs/qualification-inputs.json" -Raw | ConvertFrom-Json
          $inputRoot = Join-Path $root "qualification-inputs"
          $package = (Join-Path $inputRoot $inputs.package_path).Replace('\', '/')
          $supplyRoot = (Join-Path $inputRoot $inputs.artifacts.supply_chain_evidence.artifact_name).Replace('\', '/')
          if (-not (Test-Path -LiteralPath $package -PathType Leaf)) { throw "canonical package path from qualification manifest is missing" }
          "package=$package" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "supply_root=$supplyRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Attest exact package provenance
        id: package-attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ steps.qualification.outputs.package }}

      - name: Attest assembled-package SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ steps.qualification.outputs.package }}
          sbom-path: ${{ steps.qualification.outputs.supply_root }}/aether-package.cdx.json

      - name: Build signed provenance subject
        shell: pwsh
        run: |
          $tree = (git rev-parse "HEAD^{tree}").Trim()
          $candidateRepository = (git config --get remote.origin.url).Trim()
          python scripts/release_qualification.py build-provenance-subject `
            --repository "${{ github.repository }}" `
            --candidate-repository $candidateRepository `
            --candidate-sha "${{ inputs.candidate_sha }}" `
            --candidate-tree-sha $tree `
            --candidate-ref "${{ inputs.candidate_ref }}" `
            --package "${{ steps.qualification.outputs.package }}" `
            --attestation-bundle "${{ steps.package-attestation.outputs.bundle-path }}" `
            --qualification-inputs artifacts/release/qualification/qualification-inputs/qualification-inputs.json `
            --output artifacts/release/qualification/qualification-subjects/package-provenance.json `
            --run-id "${{ github.run_id }}" `
            --attempt "${{ github.run_attempt }}"

      - name: Assemble immutable bundle
        shell: pwsh
        run: |
          $package = "${{ steps.qualification.outputs.package }}"
          $packageSha = (Get-FileHash -Algorithm SHA256 $package).Hash.ToLowerInvariant()
          $arguments = @(
            "scripts/release_evidence.py", "assemble",
            "--evidence-dir", "artifacts/release/exact-candidate",
            "--package", $package,
            "--package-attestation-sha256", $packageSha,
            "--sbom", "${{ steps.qualification.outputs.supply_root }}/aether-rust.cdx.json",
            "--sbom", "${{ steps.qualification.outputs.supply_root }}/aether-go.cdx.json",
            "--sbom", "${{ steps.qualification.outputs.supply_root }}/aether-package.cdx.json",
            "--output-dir", "artifacts/release/bundles"
          )
          $subjects = Get-ChildItem artifacts/release/qualification/qualification-subjects -Filter "*.json"
          if ($subjects.Count -ne 18) { throw "expected 18 candidate-bound subjects, found $($subjects.Count)" }
          foreach ($subject in $subjects) {
            $arguments += @("--subject", "$($subject.BaseName)=$($subject.FullName)")
          }
          python @arguments

      - name: Upload SHA-named evidence bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aether-release-evidence-${{ inputs.candidate_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/release/bundles/aether-release-evidence-*.zip
          if-no-files-found: error

  verify-exact-candidate-evidence:
    name: Verify exact candidate evidence
    needs: exact-candidate-evidence
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout exact candidate detached
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download exact producer artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: aether-release-evidence-${{ inputs.candidate_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/release/downloaded

      - name: Verify signed provenance and immutable GitHub outcomes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tree = (git rev-parse "HEAD^{tree}").Trim()
          $bundle = Get-ChildItem artifacts/release/downloaded -Recurse -Filter "aether-release-evidence-*.zip" | Select-Object -First 1
          if (-not $bundle) { throw "downloaded evidence bundle is missing" }
          python scripts/verify_release_evidence.py $bundle.FullName `
            --expected-commit-sha "${{ inputs.candidate_sha }}" `
            --expected-tree-sha $tree `
            --expected-ref "${{ inputs.candidate_ref }}" `
            --require-official `
            --require-passed `
            --out artifacts/release/verified-verdict.json

      - name: Upload independently verified verdict
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aether-release-evidence-verdict-${{ inputs.candidate_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/release/verified-verdict.json
          if-no-files-found: error
