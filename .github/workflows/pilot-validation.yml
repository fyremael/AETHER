name: Pilot Validation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: pilot-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  launch-pack:
    name: Launch Validation (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run pilot launch validation
        shell: pwsh
        run: ./scripts/run-pilot-launch-validation.ps1

      - name: Upload pilot validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pilot-validation-artifacts
          path: |
            artifacts/pilot/reports
            artifacts/performance
            artifacts/pilot/launch
          if-no-files-found: warn

      - name: Publish workflow summary
        if: always()
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Pilot validation artifacts"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- `artifacts/pilot/reports/latest.md`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- `artifacts/performance/latest.md`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- `artifacts/performance/latest-drift.md`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- `artifacts/pilot/launch/latest.txt`"
