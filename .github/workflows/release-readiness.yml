name: Release Readiness

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  protected-release-approval:
    name: Protected release approval
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Record protected approval boundary
        run: echo "release environment approval granted for $GITHUB_SHA"

  exact-candidate-evidence:
    needs: protected-release-approval
    uses: ./.github/workflows/reusable-exact-candidate-evidence.yml
    with:
      candidate_sha: ${{ github.sha }}
      candidate_ref: ${{ github.ref }}

  release-readiness:
    name: Release Readiness (Windows)
    runs-on: windows-latest
    needs: protected-release-approval

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache-dependency-path: go/go.sum

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Install pinned release evidence dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-release.txt

      - name: Seed CI host baselines
        shell: pwsh
        run: |
          ./scripts/run-performance-baseline.ps1 -Suite core_kernel -HostManifestPath fixtures/performance/hosts/github-windows-latest.json -OutputPath artifacts/performance/baselines/core_kernel/github-windows-latest.json
          ./scripts/run-performance-baseline.ps1 -Suite service_in_process -HostManifestPath fixtures/performance/hosts/github-windows-latest.json -OutputPath artifacts/performance/baselines/service_in_process/github-windows-latest.json

      - name: Run release-readiness suite
        shell: pwsh
        run: ./scripts/run-release-readiness.ps1 -HostManifestPath fixtures/performance/hosts/github-windows-latest.json

      - name: Upload release-readiness artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-readiness-artifacts
          path: |
            artifacts/qa/release-readiness
            artifacts/pilot/reports
            artifacts/performance
            artifacts/pilot/launch
            artifacts/pilot/packages
            artifacts/pages-preview-release
          if-no-files-found: warn

      - name: Publish workflow summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path artifacts/qa/release-readiness/latest.md) {
            Get-Content artifacts/qa/release-readiness/latest.md | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Release-readiness summary was not generated."
          }
